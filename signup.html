<!doctype html>
<html>
<head>
    <title>UWA Study Buddy | Sign-Up </title>

    <!-- Using the Bootstrap link -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Using Lucas's CSS file -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container my-5">

        <!-- Title of the sign-up page -->
        <h1 class="text-center mb-4">UWA Study Buddy: Sign-up :)</h1>


          <!-- First Name -->
          <label class="form-label">Enter first name</label>
          <input type="text" class="form-control mb-3">

          <!-- Last name -->
          <label class="form-label">Enter last name</label>
          <input type="text" class="form-control mb-3">

          <!-- Create username -->
          <label class="form-label">Create user name</label>
          <input type="text" class="form-control mb-3">

          <!-- Create password -->
          <label class="form-label">Create password</label>
          <input type="text" class="form-control mb-3">

          <!-- Degree -->
          <label class="form-label">What degree are you studying?</label>
          <input type="text" class="form-control mb-4">


          <!-- Create button -->
          <button class="btn btn-primary w-100">Save and Create account</button>



    </div>

</body>
</html>
