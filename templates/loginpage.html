<!doctype html>
<html>
<head>
    <title>UWA Study Buddy | Login </title>

    <!-- Using the Bootstrap link -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Using the CSS file -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body class="bg-light bg-gradient">

<!-- Navbar -->
    <nav class="navbar navbar-expand-sm bg-navbar navbar-dark">
        <div class="container-fluid">
            <!-- UWA Study Budy Logo-->
            <a class="navbar-brand" href="#">UWA Study Buddy</a>
            <!-- List of elements on the navbar -->
            <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
                <!-- Put you links in double quotes after href-->
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('index') }}">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('create_group') }}">Create a Group</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('my_groups') }}">My Groups</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('view_groups') }}">View Groups</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

 <!-- Creating the login box-->
    <div class="container my-5">

        <div class= "row justify-content-center">

            <div class= "col-sm-8 col-md-6 col-lg-4">

                <div class="card mt-5">
                    <h5 class= "card-header text-center">Login</h5>
                    <div class ="card-body">
                        <h5 class="card-title text-center">Welcome Back :)</h5>
                        <form>

                            <!-- Username -->
                            <div class="mb-4">
                                <label for="username" class="form-label">Username:</label>
                                <input type="text" class="form-control" id="validationDefault01" required>
                            </div>

                            <!-- Password -->
                            <div class="mb-4">
                                <label for="password" class="form-label">Password:</label>
                                <input type="text" class="form-control"id="validationDefault02" required>
                            </div>

                            <!-- Login button -->
                            <button class="btn btn-primary w-100">Login</button>


                        </form>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <!-- Signup option -->
    <p class="text-center mt-3 mb-0">
        New to UWA Study Buddy? <a href="signup.html">Sign Up Here!</a>
    </p>

</body>
</html>
