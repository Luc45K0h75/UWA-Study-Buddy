<!--This is where the homepage is-->

<!doctype html>
<head>
    <title>UWA Study Buddy</title>
    <!--Imports bootstrap into the html file.-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!--Imports Lucas's CSS file that overlays bootstrap-->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>

<!-- Navbar -->
<body class="bg-light bg-gradient">
    <!-- Navbar - Uses a custom gradient-->
    <nav class="navbar navbar-expand-sm bg-navbar navbar-dark">
        <div class="container-fluid">
            <!-- UWA Study Budy Logo-->
            <a class="navbar-brand" href="#">UWA Study Buddy</a>

            <!-- List of elements on the navbar -->
            <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
                <!-- Put you links in double quotes after href-->
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="createGroup.html">Create a Group</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="myGroups.html">My Groups</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="viewGroups.html">View Groups</a>
                    </li>
                </ul>
            </div>
        </div>

        <!-- Login button -->
         <button class="login-button" onclick="window.location.href='login.html'">Login</button>
    </nav>

    <!-- Main Content-->
    <div class="container my-5">
        <div class="bg-container container-text p-4 rounded">
            <h1 class="text-center mb-4">Create a Study Group</h1>

            <form>
                <div class="mb-3">
                    <label for="unitCode" class="form-label">Unit Code</label>
                    <input type="text" class="form-control" id="unitCode" placeholder="Example: CITS3403">
                </div>

                <div class="mb-3">
                    <label for="unitName" class="form-label">Unit Name</label>
                    <input type="text" class="form-control" id="unitName" placeholder="Example: Agile Web Development">
                </div>

                <div class="mb-3">
                    <label for="topic" class="form-label">Study Topic</label>
                    <input type="text" class="form-control" id="topic" placeholder="Example: Assignment 2 discussion">
                </div>

                <div class="mb-3">
                    <label for="description" class="form-label">Description</label>
                    <textarea class="form-control" id="description" rows="3" placeholder="Write a short description of the group"></textarea>
                </div>

                <div class="mb-3">
                    <label for="materials" class="form-label">Materials to Discuss</label>
                    <textarea class="form-control" id="materials" rows="3" placeholder="Example: lecture slides, lab work, assignment questions"></textarea>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="time" class="form-label">Time</label>
                        <input type="text" class="form-control" id="time" placeholder="Example: Tuesday 2 PM">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label for="location" class="form-label">Location</label>
                        <input type="text" class="form-control" id="location" placeholder="Example: Reid Library">
                    </div>
                </div>

                <div class="mb-3">
                    <label for="members" class="form-label">Maximum Members</label>
                    <input type="number" class="form-control" id="members" placeholder="Example: 5">
                </div>

                <div class="d-flex justify-content-between">
                    <a href="index.html" class="btn btn-secondary">Cancel</a>
                    <button type="submit" class="btn btn-primary">Create Group</button>
                </div>
            </form>
        </div>
    </div>
</body>
</htm>
