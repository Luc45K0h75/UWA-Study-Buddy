        <!-- Login button -->
         <button class="login-button" onclick="window.location.href='login.html'">Login</button>
    </nav>

    <!-- Main Content-->
    <div class="container my-5">
        <div class="bg-container container-text p-4 rounded">
            <h1 class="text-center mb-4">Create a Study Group</h1>
            
            <form>
                <div class="mb-3">
                    <label for="unitCode" class="form-label">Unit Code</label>
                    <input type="text" class="form-control" id="unitCode" name="unitCode" placeholder="Example: CITS3403" required>
                </div>

                <div class="mb-3">
                    <label for="unitName" class="form-label">Unit Name</label>
                    <input type="text" class="form-control" id="unitName" name="unitName" placeholder="Example: Agile Web Development" required>
                </div>

                <div class="mb-3">
                    <label for="topic" class="form-label">Study Topic</label>
                    <input type="text" class="form-control" id="topic" name="topic" placeholder="Example: Assignment 2 discussion" required>
                </div>

                <div class="mb-3">
                    <label for="description" class="form-label">Description</label>
                    <textarea class="form-control" id="description" name="description" rows="3" placeholder="Write a short description of the group"></textarea>
                </div>

                <div class="mb-3">
                    <label for="materials" class="form-label">Materials to Discuss</label>
                    <textarea class="form-control" id="materials" name="materials" rows="3" placeholder="Example: lecture slides, lab work, assignment questions"></textarea>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="time" class="form-label">Time</label>
                        <input type="text" class="form-control" id="time" name="time" placeholder="Example: Tuesday 2 PM or TBD" >
                    </div>

                    <div class="col-md-6 mb-3">
                        <label for="location" class="form-label">Location</label>
                        <input type="text" class="form-control" id="location" name="location" placeholder="Example: Reid Library or TBD">
                    </div>
                </div>

                <div class="mb-3">
                    <label for="members" class="form-label">Maximum Members</label>
                    <input type="number" class="form-control" id="members" name="members" placeholder="Example: 5" min="1" required>
                </div>

                <div class="d-flex justify-content-between">
                    <a href="index.html" class="btn btn-secondary">Cancel</a>
                    <button type="submit" class="btn btn-primary">Create Group</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
